name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CGO_ENABLED: "0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -coverprofile=coverage.out ./...
      - name: Coverage
        run: go tool cover -func=coverage.out | tail -1
      - name: Build
        run: go build ./cmd/heic-converter
