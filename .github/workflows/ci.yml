name: CI

on:
  pull_request:
    branches: [main]

env:
  CGO_ENABLED: "0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: backend/go.sum
      - name: Install buf and protoc plugins
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.71.0
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.20.0
      # buf設定(proto/)はリポジトリルート、Goモジュールはbackend/にある
      - name: Lint proto
        run: buf lint
      - name: Check generated code is up to date
        run: |
          buf generate
          git diff --exit-code backend/internal/gen web/src/gen
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Test
        working-directory: backend
        run: go test -coverprofile=coverage.out ./...
      - name: Coverage (generated code excluded)
        working-directory: backend
        run: |
          grep -v "/internal/gen/" coverage.out > coverage.filtered.out
          go tool cover -func=coverage.filtered.out | tail -1
      - name: Build
        working-directory: backend
        run: go build ./cmd/heic-converter

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build (includes type check)
        run: npm run build
