version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/kkito0726/heic-converter/internal/gen
plugins:
  - local: protoc-gen-go
    out: internal/gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: internal/gen
    opt: paths=source_relative
  # TypeScriptクライアント(web/)向け。リモートプラグインなのでnodeなしで生成できる
  - remote: buf.build/bufbuild/es:v2.12.1
    out: web/src/gen
    opt: target=ts
