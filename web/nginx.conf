# SPA配信 + connect-rpcのリバースプロキシ設定
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 画像はbase64で約4/3倍に膨らむため、サーバー側上限(64MiB)より大きめに取る
    client_max_body_size 96m;

    # Docker内蔵DNSでリクエスト時に名前解決する(変数を使うと起動時解決を
    # 避けられ、apiコンテナの起動順・再起動に影響されない)
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:8080;

    # 変換RPC(Connect JSON / gRPC-Web)をAPIコンテナへ転送
    location /heic.v1.ConvertService/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_read_timeout 120s;
    }

    # ヘルスチェック
    location /grpc.health.v1.Health/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
    }

    # ハッシュ付きファイル名なので長期キャッシュしてよい
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPAフォールバック
    location / {
        try_files $uri /index.html;
    }
}
